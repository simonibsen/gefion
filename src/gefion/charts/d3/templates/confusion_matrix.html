<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>{{ theme_css }}
.cell-text { font-size: 12px; text-anchor: middle; dominant-baseline: central; font-weight: 600; }
.axis-label { font-size: 11px; }
.axis-title { font-size: 12px; font-weight: 600; fill: var(--color-text); }
.color-legend text { font-size: 10px; fill: var(--color-text); }
.model-label { font-size: 12px; fill: var(--color-text); opacity: 0.7; }
</style>
</head>
<body>
<div class="chart-container" id="chart"></div>
{{ d3_script }}
<script>
{% include 'utils.js' %}

const data = {{ data_json }};
const config = {{ config_json }};
const TOTAL_WIDTH = {{ width }};
const TOTAL_HEIGHT = {{ height }};

const margin = {top: 50, right: 60, bottom: 70, left: 100};
const width = TOTAL_WIDTH - margin.left - margin.right;
const height = TOTAL_HEIGHT - margin.top - margin.bottom;

const container = d3.select("#chart");
const tooltip = createTooltip(container);

// Title
container.insert("div", ":first-child")
    .attr("class", "chart-title")
    .text(config.title || "Confusion Matrix");

const svg = container.append("svg")
    .attr("width", TOTAL_WIDTH)
    .attr("height", TOTAL_HEIGHT);

const g = svg.append("g")
    .attr("transform", `translate(${margin.left},${margin.top})`);

const labels = data.labels;
const matrix = data.matrix;
const n = labels.length;

const cellSize = Math.min(width, height) / n;
const gridWidth = cellSize * n;
const gridHeight = cellSize * n;

// Center the grid
const offsetX = (width - gridWidth) / 2;
const offsetY = (height - gridHeight) / 2;

const gridG = g.append("g")
    .attr("transform", `translate(${offsetX},${offsetY})`);

// Find max value for color scale
let maxVal = 0;
for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
        if (matrix[i][j] > maxVal) maxVal = matrix[i][j];
    }
}

// Color scale: white (0) to dark blue (max)
const colorScale = d3.scaleLinear()
    .domain([0, maxVal])
    .range(["#ffffff", "#1a237e"]);

// Flatten matrix into cell data
const cells = [];
for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
        cells.push({
            row: i, col: j,
            value: matrix[i][j],
            actual: labels[i],
            predicted: labels[j]
        });
    }
}

// Draw cells
gridG.selectAll(".cell")
    .data(cells).join("rect")
    .attr("class", "cell")
    .attr("x", d => d.col * cellSize)
    .attr("y", d => d.row * cellSize)
    .attr("width", cellSize - 1)
    .attr("height", cellSize - 1)
    .attr("fill", d => colorScale(d.value))
    .attr("stroke", "#e0e0e0")
    .on("mousemove", function(event, d) {
        tooltip.show(
            `<b>Actual:</b> ${d.actual}<br>` +
            `<b>Predicted:</b> ${d.predicted}<br>` +
            `<b>Count:</b> ${d.value}`,
            event.pageX, event.pageY
        );
    })
    .on("mouseleave", function() { tooltip.hide(); });

// Cell text (count values)
gridG.selectAll(".cell-text")
    .data(cells).join("text")
    .attr("class", "cell-text")
    .attr("x", d => d.col * cellSize + cellSize / 2)
    .attr("y", d => d.row * cellSize + cellSize / 2)
    .attr("fill", d => d.value > maxVal * 0.5 ? "#fff" : "#333")
    .text(d => d.value)
    .style("pointer-events", "none");

// Row labels (left) — Actual
gridG.selectAll(".row-label")
    .data(labels).join("text")
    .attr("class", "axis-label")
    .attr("x", -8)
    .attr("y", (d, i) => i * cellSize + cellSize / 2)
    .attr("text-anchor", "end")
    .attr("dominant-baseline", "central")
    .attr("fill", "var(--color-text)")
    .text(d => d);

// Column labels (top) — Predicted
gridG.selectAll(".col-label")
    .data(labels).join("text")
    .attr("class", "axis-label")
    .attr("x", (d, i) => i * cellSize + cellSize / 2)
    .attr("y", -8)
    .attr("text-anchor", "middle")
    .attr("fill", "var(--color-text)")
    .text(d => d);

// Axis titles
g.append("text")
    .attr("class", "axis-title")
    .attr("transform", "rotate(-90)")
    .attr("x", -(offsetY + gridHeight / 2))
    .attr("y", offsetX - 70)
    .attr("text-anchor", "middle")
    .text("Actual");

g.append("text")
    .attr("class", "axis-title")
    .attr("x", offsetX + gridWidth / 2)
    .attr("y", offsetY + gridHeight + 30)
    .attr("text-anchor", "middle")
    .text("Predicted");

// Color legend
const legendWidth = 120;
const legendHeight = 12;
const legendX = width - legendWidth;
const legendY = height + 15;
const legendG = g.append("g").attr("transform", `translate(${legendX},${legendY})`);

const defs = svg.append("defs");
const gradient = defs.append("linearGradient").attr("id", "cm-gradient");
gradient.append("stop").attr("offset", "0%").attr("stop-color", "#ffffff");
gradient.append("stop").attr("offset", "100%").attr("stop-color", "#1a237e");

legendG.append("rect")
    .attr("width", legendWidth).attr("height", legendHeight)
    .attr("fill", "url(#cm-gradient)")
    .attr("stroke", "#ccc");
legendG.append("text").attr("class", "color-legend").attr("x", 0).attr("y", legendHeight + 12).text("0");
legendG.append("text").attr("class", "color-legend").attr("x", legendWidth).attr("y", legendHeight + 12).attr("text-anchor", "end").text(maxVal);

// Model name label
if (config.model_name) {
    g.append("text")
        .attr("class", "model-label")
        .attr("x", width - 5).attr("y", -10)
        .attr("text-anchor", "end")
        .text("Model: " + config.model_name);
}
</script>
</body>
</html>
