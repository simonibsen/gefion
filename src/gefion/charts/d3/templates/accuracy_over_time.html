<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>{{ theme_css }}
.line-accuracy { fill: none; stroke: #2962ff; stroke-width: 2; }
.line-cov10 { fill: none; stroke: #ff9800; stroke-width: 1.5; }
.line-cov50 { fill: none; stroke: #4caf50; stroke-width: 1.5; }
.line-cov90 { fill: none; stroke: #9c27b0; stroke-width: 1.5; }
.ref-line { stroke: #999; stroke-width: 1; stroke-dasharray: 4,3; }
.ref-label { font-size: 10px; fill: #999; }
.legend-item { cursor: pointer; }
.legend-swatch { stroke: #fff; stroke-width: 1; }
.legend-text { font-size: 11px; fill: var(--color-text); }
.legend-text.disabled { opacity: 0.35; text-decoration: line-through; }
.model-label { font-size: 12px; fill: var(--color-text); opacity: 0.7; }
</style>
</head>
<body>
<div class="chart-container" id="chart"></div>
{{ d3_script }}
<script>
{% include 'utils.js' %}

const data = {{ data_json }};
const config = {{ config_json }};
const TOTAL_WIDTH = {{ width }};
const TOTAL_HEIGHT = {{ height }};

// Parse dates
data.forEach(d => { d._date = new Date(d.date); });

const margin = {top: 40, right: 50, bottom: 30, left: 70};
const width = TOTAL_WIDTH - margin.left - margin.right;
const height = TOTAL_HEIGHT - margin.top - margin.bottom;

const container = d3.select("#chart");
const tooltip = createTooltip(container);

// Title
container.insert("div", ":first-child")
    .attr("class", "chart-title")
    .text(config.title || "Accuracy Over Time");

const svg = container.append("svg")
    .attr("width", TOTAL_WIDTH)
    .attr("height", TOTAL_HEIGHT);

const g = svg.append("g")
    .attr("transform", `translate(${margin.left},${margin.top})`);

// Scales
const xScale = d3.scaleTime()
    .domain(d3.extent(data, d => d._date))
    .range([0, width]);

const yScale = d3.scaleLinear()
    .domain([0, 1])
    .range([height, 0]);

// Grid
g.append("g").attr("class", "grid")
    .call(d3.axisLeft(yScale).tickSize(-width).tickFormat(""))
    .select(".domain").remove();

// Axes
g.append("g").attr("class", "axis")
    .call(d3.axisLeft(yScale).ticks(5).tickFormat(d3.format(".0%")));
g.append("g").attr("class", "axis")
    .attr("transform", `translate(0,${height})`)
    .call(d3.axisBottom(xScale).ticks(6).tickFormat(d3.timeFormat("%b %d")));

// Horizontal reference lines at key thresholds
const refThresholds = [
    {val: 0.1, label: "10%"},
    {val: 0.5, label: "50%"},
    {val: 0.9, label: "90%"},
];
refThresholds.forEach(t => {
    g.append("line")
        .attr("class", "ref-line")
        .attr("x1", 0).attr("x2", width)
        .attr("y1", yScale(t.val)).attr("y2", yScale(t.val));
    g.append("text")
        .attr("class", "ref-label")
        .attr("x", width + 5)
        .attr("y", yScale(t.val) + 4)
        .text(t.label);
});

// Series definitions
const series = [
    {key: "accuracy", cls: "line-accuracy", color: "#2962ff", label: "Accuracy"},
    {key: "coverage_10", cls: "line-cov10", color: "#ff9800", label: "Coverage 10%"},
    {key: "coverage_50", cls: "line-cov50", color: "#4caf50", label: "Coverage 50%"},
    {key: "coverage_90", cls: "line-cov90", color: "#9c27b0", label: "Coverage 90%"},
];

// Track visibility state
const visible = {};
series.forEach(s => { visible[s.key] = true; });

// Draw lines
const paths = {};
series.forEach(s => {
    const lineGen = d3.line()
        .defined(d => d[s.key] != null)
        .x(d => xScale(d._date))
        .y(d => yScale(d[s.key]));
    paths[s.key] = g.append("path")
        .datum(data)
        .attr("class", s.cls)
        .attr("d", lineGen);
});

// Legend with toggle
const legendG = g.append("g")
    .attr("transform", `translate(${width - 160}, 5)`);

series.forEach((s, i) => {
    const itemG = legendG.append("g")
        .attr("class", "legend-item")
        .attr("transform", `translate(0, ${i * 20})`)
        .style("cursor", "pointer")
        .on("click", function() {
            visible[s.key] = !visible[s.key];
            paths[s.key].style("display", visible[s.key] ? null : "none");
            d3.select(this).select(".legend-swatch")
                .attr("fill", visible[s.key] ? s.color : "#ccc");
            d3.select(this).select(".legend-text")
                .classed("disabled", !visible[s.key]);
        });

    itemG.append("rect")
        .attr("class", "legend-swatch")
        .attr("width", 14).attr("height", 14)
        .attr("rx", 2).attr("ry", 2)
        .attr("fill", s.color);

    itemG.append("text")
        .attr("class", "legend-text")
        .attr("x", 20).attr("y", 11)
        .text(s.label);
});

// Crosshair + tooltip
const crosshair = createCrosshair(g, width, height);
const bisect = d3.bisector(d => d._date).left;

svg.append("rect")
    .attr("width", width)
    .attr("height", height)
    .attr("transform", `translate(${margin.left},${margin.top})`)
    .attr("fill", "transparent")
    .on("mousemove", function(event) {
        const [mx, my] = d3.pointer(event, g.node());
        const x0 = xScale.invert(mx);
        const idx = Math.min(data.length - 1, Math.max(0, bisect(data, x0)));
        const d = data[idx];
        if (!d) return;
        crosshair.show(xScale(d._date), my);
        let html = `<b>${formatDate(d.date)}</b>`;
        series.forEach(s => {
            if (visible[s.key] && d[s.key] != null) {
                html += `<br><span style="color:${s.color}">${s.label}:</span> ${(d[s.key] * 100).toFixed(1)}%`;
            }
        });
        tooltip.show(html, event.pageX, event.pageY);
    })
    .on("mouseleave", function() {
        crosshair.hide();
        tooltip.hide();
    });

// Model name label
if (config.model_name) {
    g.append("text")
        .attr("class", "model-label")
        .attr("x", 5).attr("y", -10)
        .text("Model: " + config.model_name);
}
</script>
</body>
</html>
