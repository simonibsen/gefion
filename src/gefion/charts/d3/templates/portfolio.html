<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>{{ theme_css }}
.equity-line { fill: none; stroke: var(--color-price); stroke-width: 2; }
.equity-area { fill: rgba(41, 98, 255, 0.1); }
.drawdown-area { fill: rgba(239, 83, 80, 0.25); }
.drawdown-line { fill: none; stroke: var(--color-down); stroke-width: 1.5; }
.zero-line { stroke: var(--color-grid); stroke-dasharray: 4,3; stroke-width: 1; }
.metric-card { fill: var(--color-bg, #fff); stroke: var(--color-grid, #e0e0e0); stroke-width: 1; rx: 6; ry: 6; }
.metric-value { font-size: 18px; font-weight: 700; text-anchor: middle; }
.metric-label { font-size: 10px; text-anchor: middle; fill: var(--color-text); opacity: 0.7; }
.strategy-label { font-size: 12px; fill: var(--color-text); opacity: 0.7; }
</style>
</head>
<body>
<div class="chart-container" id="chart"></div>
{{ d3_script }}
<script>
{% include 'utils.js' %}

const data = {{ data_json }};
const config = {{ config_json }};
const TOTAL_WIDTH = {{ width }};
const TOTAL_HEIGHT = {{ height }};

const equity = data.equity || [];
const metrics = data.metrics || {};

// Parse dates
equity.forEach(d => { d._date = new Date(d.date); });

const margin = {top: 40, right: 10, bottom: 30, left: 70};
const chartFrac = 0.7;
const panelFrac = 0.3;
const chartWidth = TOTAL_WIDTH * chartFrac - margin.left - margin.right;
const panelLeft = TOTAL_WIDTH * chartFrac + 10;
const panelWidth = TOTAL_WIDTH * panelFrac - 20;
const totalInnerH = TOTAL_HEIGHT - margin.top - margin.bottom;
const gap = 10;
const equityH = totalInnerH * 0.75 - gap;
const ddH = totalInnerH * 0.25;

const container = d3.select("#chart");
const tooltip = createTooltip(container);

// Title
container.insert("div", ":first-child")
    .attr("class", "chart-title")
    .text(config.title || "Portfolio Performance");

const svg = container.append("svg")
    .attr("width", TOTAL_WIDTH)
    .attr("height", TOTAL_HEIGHT);

// ── Left: Equity Curve ──
const xScale = d3.scaleTime()
    .domain(d3.extent(equity, d => d._date))
    .range([0, chartWidth]);

const yEquity = d3.scaleLinear()
    .domain([
        d3.min(equity, d => d.value) * 0.995,
        d3.max(equity, d => d.value) * 1.005
    ])
    .range([equityH, 0]);

const eG = svg.append("g")
    .attr("transform", `translate(${margin.left},${margin.top})`);

// Grid
eG.append("g").attr("class", "grid")
    .call(d3.axisLeft(yEquity).tickSize(-chartWidth).tickFormat(""))
    .select(".domain").remove();

// Axes
eG.append("g").attr("class", "axis")
    .call(d3.axisLeft(yEquity).tickFormat(d => formatPrice(d)));
eG.append("g").attr("class", "axis")
    .attr("transform", `translate(0,${equityH})`)
    .call(d3.axisBottom(xScale).ticks(6).tickFormat(d3.timeFormat("%b %d")));

// Equity area
const areaGen = d3.area()
    .x(d => xScale(d._date))
    .y0(equityH)
    .y1(d => yEquity(d.value));
eG.append("path").datum(equity).attr("class", "equity-area").attr("d", areaGen);

// Equity line
const lineGen = d3.line().x(d => xScale(d._date)).y(d => yEquity(d.value));
eG.append("path").datum(equity).attr("class", "equity-line").attr("d", lineGen);

// Drawdown subplot
const ddTop = margin.top + equityH + gap;
const yDD = d3.scaleLinear()
    .domain([d3.min(equity, d => -d.drawdown) * 1.1, 0])
    .range([ddH, 0]);

const ddG = svg.append("g")
    .attr("transform", `translate(${margin.left},${ddTop})`);

ddG.append("line").attr("class", "zero-line")
    .attr("x1", 0).attr("x2", chartWidth)
    .attr("y1", yDD(0)).attr("y2", yDD(0));

const ddArea = d3.area()
    .x(d => xScale(d._date))
    .y0(yDD(0))
    .y1(d => yDD(-d.drawdown));
ddG.append("path").datum(equity).attr("class", "drawdown-area").attr("d", ddArea);

const ddLine = d3.line().x(d => xScale(d._date)).y(d => yDD(-d.drawdown));
ddG.append("path").datum(equity).attr("class", "drawdown-line").attr("d", ddLine);

ddG.append("g").attr("class", "axis")
    .call(d3.axisLeft(yDD).ticks(3).tickFormat(d => (d * 100).toFixed(1) + "%"));

// Crosshair + tooltip on equity panel
const crosshair = createCrosshair(eG, chartWidth, equityH);
const bisect = d3.bisector(d => d._date).left;
const firstVal = equity.length > 0 ? equity[0].value : 1;

svg.append("rect")
    .attr("width", chartWidth)
    .attr("height", equityH)
    .attr("transform", `translate(${margin.left},${margin.top})`)
    .attr("fill", "transparent")
    .on("mousemove", function(event) {
        const [mx, my] = d3.pointer(event, eG.node());
        const x0 = xScale.invert(mx);
        const idx = Math.min(equity.length - 1, Math.max(0, bisect(equity, x0)));
        const d = equity[idx];
        if (!d) return;
        crosshair.show(xScale(d._date), my);
        const ret = ((d.value - firstVal) / firstVal * 100).toFixed(2);
        const dd = (d.drawdown * 100).toFixed(2);
        tooltip.show(
            `<b>${formatDate(d.date)}</b><br>` +
            `Value: ${formatPrice(d.value)}<br>` +
            `Return: <span style="color:${ret >= 0 ? 'var(--color-up)' : 'var(--color-down)'}">${ret >= 0 ? '+' : ''}${ret}%</span><br>` +
            `Drawdown: <span style="color:var(--color-down)">-${dd}%</span>`,
            event.pageX, event.pageY
        );
    })
    .on("mouseleave", function() { crosshair.hide(); tooltip.hide(); });

// ── Right: Metrics Panel ──
const metricsArr = [
    {label: "Total Return", value: (metrics.total_return != null ? (metrics.total_return >= 0 ? "+" : "") + metrics.total_return.toFixed(1) + "%" : "N/A"), color: metrics.total_return >= 0 ? "var(--color-up, #4caf50)" : "var(--color-down, #ef5350)"},
    {label: "Sharpe Ratio", value: metrics.sharpe != null ? metrics.sharpe.toFixed(2) : "N/A", color: "var(--color-text)"},
    {label: "Max Drawdown", value: metrics.max_drawdown != null ? metrics.max_drawdown.toFixed(1) + "%" : "N/A", color: "var(--color-down, #ef5350)"},
    {label: "Win Rate", value: metrics.win_rate != null ? metrics.win_rate.toFixed(1) + "%" : "N/A", color: "var(--color-text)"},
    {label: "Trades", value: metrics.trades != null ? metrics.trades.toString() : "N/A", color: "var(--color-text)"},
];

const cardH = 52;
const cardGap = 8;
const cardStartY = margin.top + 10;

const mG = svg.append("g").attr("transform", `translate(${panelLeft},0)`);

// Strategy label
if (config.strategy_name) {
    mG.append("text")
        .attr("class", "strategy-label")
        .attr("x", panelWidth / 2)
        .attr("y", cardStartY - 5)
        .attr("text-anchor", "middle")
        .text("Strategy: " + config.strategy_name);
}

metricsArr.forEach((m, i) => {
    const y = cardStartY + 10 + i * (cardH + cardGap);
    mG.append("rect")
        .attr("class", "metric-card")
        .attr("x", 0).attr("y", y)
        .attr("width", panelWidth).attr("height", cardH);
    mG.append("text")
        .attr("class", "metric-value")
        .attr("x", panelWidth / 2)
        .attr("y", y + 24)
        .attr("fill", m.color)
        .text(m.value);
    mG.append("text")
        .attr("class", "metric-label")
        .attr("x", panelWidth / 2)
        .attr("y", y + 42)
        .text(m.label);
});
</script>
</body>
</html>
