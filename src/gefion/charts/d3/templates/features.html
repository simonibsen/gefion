<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>{{ theme_css }}
.price-line { fill: none; stroke: var(--color-price); stroke-width: 2; }
.feature-line { fill: none; stroke-width: 1.5; }
.subplot-divider { stroke: var(--color-grid); stroke-width: 1; }
.feature-label { font-size: 11px; font-weight: 600; }
</style>
</head>
<body>
<div class="chart-container" id="chart"></div>
{{ d3_script }}
<script>
{% include 'utils.js' %}

const data = {{ data_json }};
const config = {{ config_json }};
const TOTAL_WIDTH = {{ width }};
const TOTAL_HEIGHT = {{ height }};

const CHART_PALETTE = [
    "#2962ff", "#ff9800", "#9c27b0", "#00bcd4",
    "#e91e63", "#4caf50", "#ff5722", "#607d8b",
    "#795548", "#009688", "#3f51b5", "#cddc39"
];

// Parse dates in OHLCV
const ohlcv = data.ohlcv || [];
ohlcv.forEach(d => { d._date = new Date(d.date); });

const features = data.features || {};
const featureNames = config.feature_names || Object.keys(features);
const numFeatures = featureNames.length;

// Parse dates in each feature
featureNames.forEach(name => {
    if (features[name]) {
        features[name].forEach(d => { d._date = new Date(d.date); });
    }
});

const margin = {top: 40, right: 50, bottom: 30, left: 70};
const gap = 6;
const innerWidth = TOTAL_WIDTH - margin.left - margin.right;
const totalInnerHeight = TOTAL_HEIGHT - margin.top - margin.bottom;

// Price chart gets top portion, features split the rest
const priceRatio = numFeatures > 0 ? 0.45 : 1.0;
const priceHeight = totalInnerHeight * priceRatio - (numFeatures > 0 ? gap : 0);
const featureTotalHeight = totalInnerHeight * (1 - priceRatio);
const featureHeight = numFeatures > 0 ? (featureTotalHeight - gap * (numFeatures - 1)) / numFeatures : 0;

const container = d3.select("#chart");
const tooltip = createTooltip(container);

// Title
container.insert("div", ":first-child")
    .attr("class", "chart-title")
    .text(config.title || (config.symbol || "") + " Features");

const svg = container.append("svg")
    .attr("width", TOTAL_WIDTH)
    .attr("height", TOTAL_HEIGHT);

// Shared x scale (time)
const allDates = ohlcv.map(d => d._date);
const xScale = d3.scaleTime()
    .domain(d3.extent(allDates))
    .range([0, innerWidth]);

// --- Price subplot ---
const yPrice = d3.scaleLinear()
    .domain([
        d3.min(ohlcv, d => d.close) * 0.995,
        d3.max(ohlcv, d => d.close) * 1.005
    ])
    .range([priceHeight, 0]);

const priceG = svg.append("g")
    .attr("transform", `translate(${margin.left},${margin.top})`);

// Grid
priceG.append("g").attr("class", "grid")
    .call(d3.axisLeft(yPrice).tickSize(-innerWidth).tickFormat(""))
    .select(".domain").remove();

// Y axis
priceG.append("g").attr("class", "axis")
    .call(d3.axisLeft(yPrice).tickFormat(d => formatPrice(d)));

// Price line
const priceLine = d3.line()
    .x(d => xScale(d._date))
    .y(d => yPrice(d.close));

priceG.append("path")
    .datum(ohlcv)
    .attr("class", "price-line")
    .attr("d", priceLine);

// Price label
priceG.append("text")
    .attr("class", "feature-label")
    .attr("x", 5)
    .attr("y", 14)
    .attr("fill", "var(--color-price)")
    .text("Price");

// --- Feature subplots ---
const featureGroups = [];

featureNames.forEach((name, i) => {
    const fData = features[name] || [];
    if (fData.length === 0) return;

    const fTop = margin.top + priceHeight + gap + i * (featureHeight + gap);

    const yFeature = d3.scaleLinear()
        .domain([
            d3.min(fData, d => d.value) * 1.05,
            d3.max(fData, d => d.value) * 1.05
        ])
        .range([featureHeight, 0])
        .nice();

    const fG = svg.append("g")
        .attr("transform", `translate(${margin.left},${fTop})`);

    // Divider line above
    fG.append("line")
        .attr("class", "subplot-divider")
        .attr("x1", 0).attr("x2", innerWidth)
        .attr("y1", 0).attr("y2", 0);

    // Grid
    fG.append("g").attr("class", "grid")
        .call(d3.axisLeft(yFeature).ticks(3).tickSize(-innerWidth).tickFormat(""))
        .select(".domain").remove();

    // Y axis
    fG.append("g").attr("class", "axis")
        .call(d3.axisLeft(yFeature).ticks(3));

    // Feature line
    const fLine = d3.line()
        .x(d => xScale(d._date))
        .y(d => yFeature(d.value));

    const color = CHART_PALETTE[i % CHART_PALETTE.length];

    fG.append("path")
        .datum(fData)
        .attr("class", "feature-line")
        .attr("d", fLine)
        .attr("stroke", color);

    // Feature label
    fG.append("text")
        .attr("class", "feature-label")
        .attr("x", 5)
        .attr("y", 14)
        .attr("fill", color)
        .text(name);

    featureGroups.push({name, fData, yFeature, color});
});

// Bottom x axis
const bottomY = margin.top + priceHeight + gap + numFeatures * (featureHeight + gap) - gap;
svg.append("g")
    .attr("class", "axis")
    .attr("transform", `translate(${margin.left},${bottomY})`)
    .call(d3.axisBottom(xScale).ticks(8).tickFormat(d3.timeFormat("%b %d")));

// Crosshair + tooltip interaction
const crosshair = createCrosshair(priceG, innerWidth, priceHeight);

svg.append("rect")
    .attr("width", innerWidth)
    .attr("height", totalInnerHeight)
    .attr("transform", `translate(${margin.left},${margin.top})`)
    .attr("fill", "transparent")
    .on("mousemove", function(event) {
        const [mx, my] = d3.pointer(event, priceG.node());
        const bisect = d3.bisector(d => d._date).left;
        const x0 = xScale.invert(mx);
        const idx = Math.min(ohlcv.length - 1, Math.max(0, bisect(ohlcv, x0)));
        const d = ohlcv[idx];
        if (!d) return;
        crosshair.show(xScale(d._date), Math.min(my, priceHeight));

        let html = `<b>${formatDate(d.date)}</b><br>` +
            `Price: ${formatPrice(d.close)}<br>`;
        featureGroups.forEach(fg => {
            const fi = Math.min(fg.fData.length - 1, Math.max(0, bisect(fg.fData, x0)));
            const fv = fg.fData[fi];
            if (fv) {
                html += `<span style="color:${fg.color}">${fg.name}: ${fv.value.toFixed(2)}</span><br>`;
            }
        });
        tooltip.show(html, event.pageX, event.pageY);
    })
    .on("mouseleave", function() {
        crosshair.hide();
        tooltip.hide();
    });
</script>
</body>
</html>
