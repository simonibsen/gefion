name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Classify the diff so doc-only changes skip the expensive jobs.
  # Job-level `if:` skips report conclusion "skipped", which satisfies
  # required status checks — unlike workflow-level paths-ignore, which
  # leaves them "expected" and blocks the merge. Docs are load-bearing
  # here (tests/test_docs_drift.py parses them), so doc-only changes
  # still run the light docs-drift job below instead of nothing.
  changes:
    name: Classify diff
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: classify
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          # force-push / first push: unknown base -> treat as code change
          if ! git cat-file -e "$BASE" 2>/dev/null; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE"...HEAD)
          echo "$CHANGED"
          if [ -z "$CHANGED" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if echo "$CHANGED" | grep -qvE '^(docs/|specs/|memory/|\.claude/)|\.md$'; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          fi

  # Doc-only fast path: the docs-drift suite is the part of CI that
  # actually reads the docs — run it alone (~2 min) instead of the full
  # 15 CI-minutes.
  docs-drift:
    name: Docs drift (doc-only fast path)
    needs: changes
    if: needs.changes.outputs.docs_only == 'true'
    runs-on: ubuntu-latest
    env:
      OTEL_ENABLED: "false"
      TERM: dumb
      COLUMNS: "200"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package with extras
        run: pip install -e ".[dev,ml_extended,charts,ui]"
      - name: Docs drift suite
        run: pytest tests/test_docs_drift.py tests/test_mcp_docs_tools.py -q

  test:
    name: Unit tests + drift checks
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    env:
      OTEL_ENABLED: "false"
      # Rich force-enables terminal rendering when it sees GITHUB_ACTIONS,
      # which wraps/colors Typer help text and breaks substring asserts.
      # TERM=dumb disables ANSI; COLUMNS stops 80-col truncation.
      TERM: dumb
      COLUMNS: "200"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with extras
        run: pip install -e ".[dev,ml_extended,charts,ui]"

      # Same gate as the local pre-push hook. DB tests are skipped
      # (ENABLE_DB_TESTS unset) and UI/Playwright tests are deselected
      # via addopts; the db-test job below runs the full suite against
      # a TimescaleDB service container.
      - name: Run unit tests
        run: pytest tests/

      # Hermetic: reads sql/schema.sql + sql/migrations/*.sql, no DB.
      - name: Data dictionary drift check
        run: python scripts/gen_data_dictionary.py --check

  # This job is a REQUIRED status check on main. Escape hatch: if it ever
  # blocks a merge through no fault of the code (e.g. a service-container
  # startup flake), re-run the job first; if it's genuinely stuck, remove
  # "DB-backed tests (TimescaleDB)" from the required checks in
  # Settings → Branches → main (or:
  #   gh api -X DELETE repos/simonibsen/gefion/branches/main/protection/required_status_checks/contexts \
  #     --input - <<< '["DB-backed tests (TimescaleDB)"]'
  # ) and re-add it after merging.
  db-test:
    name: DB-backed tests (TimescaleDB)
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    env:
      OTEL_ENABLED: "false"
      # See the test job for why TERM/COLUMNS are set.
      TERM: dumb
      COLUMNS: "200"
      ENABLE_DB_TESTS: "1"
      # Mirrors the local convention: point at the base database and let
      # conftest derive gefion_test, create it, and run db-init against it.
      # The suite self-seeds all data it needs (issue #29) — no fixtures.
      DATABASE_URL: postgresql://gefion:gefionpass@localhost:5432/gefion
    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: gefion
          POSTGRES_PASSWORD: gefionpass
          POSTGRES_DB: gefion
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gefion"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with extras
        run: pip install -e ".[dev,ml_extended,charts,ui]"

      - name: Run full test suite (including DB tests)
        run: pytest tests/

      # The discovery feature's own acceptance proof (spec 006, FR-112):
      # zero survivors in pure noise + planted-regime recovery, named here
      # for visibility even though the full suite above already ran it.
      - name: Negative-control suite (SC-101/102)
        run: pytest tests/test_discovery_negative_control.py -v
