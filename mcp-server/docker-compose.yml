version: '3.8'

services:
  # MCP Server (includes gefion CLI)
  mcp-server:
    build:
      context: ..
      dockerfile: mcp-server/Dockerfile
    container_name: gefion-mcp-server
    stdin_open: true  # Required for MCP stdio
    tty: false
    environment:
      DATABASE_URL: postgresql://gefion:gefionpass@postgres:5432/gefion
      ALPHAVANTAGE_API_KEY: ${ALPHAVANTAGE_API_KEY:-}
    volumes:
      # Mount directories for persistent storage
      - ../datasets:/app/datasets
      - ../models:/app/models
      - ../feature-functions:/app/feature-functions
      - ../feature-definitions:/app/feature-definitions
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gefion-network

  # PostgreSQL database (shared with main gefion)
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: gefion-postgres
    environment:
      POSTGRES_DB: gefion
      POSTGRES_USER: gefion
      POSTGRES_PASSWORD: gefionpass
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gefion -d gefion"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gefion-network

networks:
  gefion-network:
    driver: bridge

volumes:
  postgres-data:

# ============================================================================
# Usage
# ============================================================================

# Start services:
#   cd mcp-server && docker-compose up -d

# View logs:
#   docker-compose logs -f mcp-server

# Run gefion command in container:
#   docker-compose run --rm mcp-server gefion ml dataset-build --help

# Stop services:
#   docker-compose down

# For Claude Desktop integration, configure claude_desktop_config.json
# to use: docker-compose run --rm mcp-server
