# Ernest Chan — Quantitative Trading (2008) & Algorithmic Trading (2013)
# ---------------------------------------------------------------------------

- id: half-life-mean-reversion
  source:
    author: "Ernest Chan"
    title: "Algorithmic Trading"
    year: 2013
    chapter: "Chapter 2 — Mean Reversion"
  claim: "The half-life of mean reversion, estimated via the Ornstein-Uhlenbeck process, determines optimal holding periods and signal lookback windows for mean-reversion strategies."
  mechanism: "Fitting an AR(1) model to the spread or price series yields a mean-reversion speed parameter. The half-life (ln(2)/|speed|) gives the expected time for a deviation to revert halfway to the mean, directly informing lookback windows for z-score computation and expected holding periods for position exits."
  experiment_types: [strategy_optimization, feature_engineering]
  testable_prediction: "Mean-reversion strategies whose lookback and holding periods are calibrated to the OU half-life will outperform strategies using arbitrary fixed windows (e.g., 20-day or 60-day)."
  experiment_design: "For each stock in Gefion's universe, estimate the OU half-life from the most recent 2 years of close prices. Set the Bollinger Band lookback and exit horizon to the half-life. Backtest this adaptive-window mean-reversion strategy against fixed 20-day and 60-day window versions. Compare Sharpe, win rate, and average holding period."
  known_limitations: "Half-life estimates are noisy for short series and can shift dramatically across regimes. Not all stocks are mean-reverting — the method only applies where the ADF test rejects the unit root null."
  data_requirements: ["ohlcv.close", "features.bollinger_upper", "features.bollinger_lower"]
  empirical_status: untested
  experiments: []

- id: hurst-exponent-regime
  source:
    author: "Ernest Chan"
    title: "Algorithmic Trading"
    year: 2013
    chapter: "Chapter 2 — Mean Reversion and Chapter 4 — Mean Reversion of Stocks and ETFs"
  claim: "The Hurst exponent classifies a time series as mean-reverting (H < 0.5), random walk (H = 0.5), or trending (H > 0.5), enabling regime-dependent strategy selection."
  mechanism: "The Hurst exponent measures the scaling of the range of cumulative deviations relative to the standard deviation. H < 0.5 indicates anti-persistence (mean reversion), H > 0.5 indicates persistence (trending). By computing rolling Hurst exponents, one can dynamically switch between mean-reversion and trend-following strategies."
  experiment_types: [feature_engineering, strategy_optimization]
  testable_prediction: "A regime-switching strategy that applies mean-reversion signals when rolling Hurst < 0.45 and trend-following signals when Hurst > 0.55 will outperform either strategy applied unconditionally."
  experiment_design: "Compute rolling 252-day Hurst exponent for each stock. Classify regimes: mean-reverting (H < 0.45), trending (H > 0.55), indeterminate (0.45-0.55). Route stocks to Gefion's Bollinger mean-reversion strategy or MACD trend strategy based on regime. Backtest the routed strategy versus each strategy applied uniformly. Measure Sharpe, drawdown, and per-regime hit rates."
  known_limitations: "Hurst exponent estimation is sensitive to the method (R/S, DFA, variance ratio) and sample length. Regime boundaries (0.45, 0.55) are arbitrary and should be optimized. Transitions between regimes cause whipsaws."
  data_requirements: ["ohlcv.close", "features.rsi", "features.macd", "features.bollinger_upper", "features.bollinger_lower"]
  empirical_status: untested
  experiments: []

- id: kelly-criterion-sizing
  source:
    author: "Ernest Chan"
    title: "Quantitative Trading"
    year: 2008
    chapter: "Chapter 6 — Money and Risk Management"
  claim: "The Kelly criterion determines the growth-optimal fraction of capital to allocate to each bet, but in practice half-Kelly is preferred because the full Kelly is highly sensitive to estimation error and produces severe drawdowns."
  mechanism: "Full Kelly (f* = edge/odds or equivalently mean/variance of returns) maximizes the long-run geometric growth rate of the portfolio. However, estimation errors in expected return and variance cause the realized allocation to overshoot, leading to excessive drawdowns. Half-Kelly (f*/2) sacrifices ~25% of growth rate for ~50% reduction in variance of drawdowns."
  experiment_types: [strategy_optimization]
  testable_prediction: "Half-Kelly position sizing will produce a higher Sharpe ratio and lower maximum drawdown than full Kelly, equal-weight, or inverse-volatility sizing when applied to Gefion's strategy signals."
  experiment_design: "Estimate per-stock Kelly fraction from Gefion's rolling 6-month mean and variance of predicted returns. Backtest four sizing schemes: full Kelly, half-Kelly, equal-weight, and inverse-volatility. Cap any single position at 5% of portfolio. Compare geometric growth rate, Sharpe, max drawdown, and tail risk (CVaR 5%) over 3+ year walk-forward."
  known_limitations: "Kelly assumes returns are iid and normally distributed — financial returns are neither. With highly correlated positions, Kelly can produce leverage beyond available capital. Must be combined with gross leverage and single-name concentration limits."
  data_requirements: ["ml_predictions.expected_return", "ohlcv.close", "ohlcv.volume"]
  empirical_status: untested
  experiments: []

- id: pairs-trading-cointegration
  source:
    author: "Ernest Chan"
    title: "Algorithmic Trading"
    year: 2013
    chapter: "Chapter 3 — Cointegration"
  claim: "Pairs trading based on cointegration (Engle-Granger or Johansen test) is more robust than correlation-based pair selection because cointegration captures a long-run equilibrium relationship, not just co-movement."
  mechanism: "Two correlated stocks may drift apart permanently, but cointegrated stocks share a stochastic trend — their spread is stationary and mean-reverting by construction. Trading the z-score of the cointegrated spread provides a statistically grounded entry/exit framework with a defined half-life."
  experiment_types: [strategy_optimization, feature_engineering]
  testable_prediction: "Pairs selected by cointegration (Engle-Granger p < 0.05) will have more persistent profitability over 12+ months than pairs selected by top correlation, because correlated-but-not-cointegrated pairs will experience spread divergence."
  experiment_design: "Screen all within-sector stock pairs in Gefion's universe for cointegration (Engle-Granger test, rolling 2-year window). Also select the top pairs by Pearson correlation. Trade both sets using a z-score mean-reversion strategy (enter at |z| > 2, exit at |z| < 0.5). Walk-forward backtest over 3 years, comparing Sharpe, pair survival rate (% still cointegrated after 12 months), and max drawdown."
  known_limitations: "Cointegration relationships can break down, especially during structural changes (mergers, sector shifts). Transaction costs and slippage erode thin mean-reversion profits. Requires frequent re-screening of the pair universe."
  data_requirements: ["ohlcv.close", "fundamental.sector", "fundamental.industry"]
  empirical_status: untested
  experiments: []

- id: regime-detection-hmm
  source:
    author: "Ernest Chan"
    title: "Algorithmic Trading"
    year: 2013
    chapter: "Chapter 7 — Regime Detection"
  claim: "Hidden Markov Models can identify latent market regimes (bull, bear, sideways) from observable features, enabling regime-conditional strategy execution that reduces drawdowns during unfavorable regimes."
  mechanism: "An HMM models the market as transitioning between a finite number of hidden states, each with distinct return/volatility distributions. The Viterbi algorithm decodes the most likely state sequence, and transition probabilities estimate the persistence of each regime, enabling the system to reduce exposure during high-volatility or bear states."
  experiment_types: [strategy_optimization, feature_engineering]
  testable_prediction: "A strategy that reduces position sizes by 50% during HMM-detected bear/high-volatility regimes will achieve lower maximum drawdown and higher risk-adjusted returns than a regime-unaware strategy."
  experiment_design: "Fit a 3-state Gaussian HMM on rolling SPY returns and VIX levels. Label states as bull, sideways, and bear based on emission parameters. Apply regime-conditional scaling to Gefion's strategy signals: full size in bull, 50% in sideways, 20% in bear. Backtest against unscaled signals over 5+ years including at least one major drawdown. Compare max drawdown, Sharpe, and Calmar ratio."
  known_limitations: "HMMs are sensitive to the number of states and initialization. Regime detection is lagging — by the time a bear regime is identified, much of the drawdown may have already occurred. Overfitting to historical regimes is a significant risk."
  data_requirements: ["ohlcv.close", "features.volatility_realized", "macro.vix", "macro.spy_returns"]
  empirical_status: untested
  experiments: []
