- id: fractional-differentiation
  source:
    author: "Marcos López de Prado"
    title: "Advances in Financial Machine Learning"
    year: 2018
    chapter: "Chapter 5 — Fractionally Differentiated Features"
  claim: "Fractional differentiation preserves memory (predictive signal) while achieving stationarity, unlike integer differencing which destroys long-range dependence."
  mechanism: "By applying a fractional order d (typically 0 < d < 1) to the differencing operator, the series becomes stationary at a lower d than the conventional d=1, retaining the maximum amount of memory as measured by correlation with the original level series."
  experiment_types: [feature_engineering, model_comparison]
  testable_prediction: "Models trained on fractionally differentiated price features (d chosen via ADF-stationarity threshold) will produce higher out-of-sample Sharpe ratios than models trained on returns (d=1) or raw prices (d=0)."
  experiment_design: "For each stock universe subset, compute frac-diff features at the minimum d that passes an ADF test at 5% significance. Train the existing quantile regression model on (a) raw returns, (b) frac-diff features, and (c) log prices. Compare OOS Sharpe, hit rate, and information coefficient across a walk-forward backtest."
  known_limitations: "The optimal d is asset-specific and regime-dependent. Frac-diff features require a long lookback window and are sensitive to the weight-loss cutoff threshold. Computationally expensive for 5000-stock universes without vectorized implementations."
  data_requirements: ["ohlcv.close", "ohlcv.volume"]
  empirical_status: untested
  experiments: []

- id: purged-cross-validation
  source:
    author: "Marcos López de Prado"
    title: "Advances in Financial Machine Learning"
    year: 2018
    chapter: "Chapter 7 — Cross-Validation in Finance"
  claim: "Standard k-fold cross-validation produces inflated performance estimates in financial ML because of information leakage from overlapping labels; purging and embargoing the folds eliminates this bias."
  mechanism: "When labels span a time interval (e.g., triple-barrier labels), a training observation whose label period overlaps with a test observation leaks future information. Purging removes training samples whose label spans overlap the test set, and an embargo gap further prevents serial correlation leakage at fold boundaries."
  experiment_types: [pipeline, model_comparison]
  testable_prediction: "Purged k-fold CV accuracy estimates will be lower and closer to true OOS performance than standard k-fold CV, reducing the gap between backtest and live accuracy by at least 30%."
  experiment_design: "Train Gefion's trend classifier using both standard 5-fold CV and purged 5-fold CV with a 2-day embargo. Record in-sample accuracy for each method, then measure true OOS accuracy on the subsequent 3-month holdout. Compare the spread between CV estimate and OOS reality for each method."
  known_limitations: "Purging reduces effective training set size, which may hurt model performance on small datasets. The embargo period length requires calibration — too short allows leakage, too long wastes data."
  data_requirements: ["ohlcv.close", "features.*", "ml_labels.start_time", "ml_labels.end_time"]
  empirical_status: untested
  experiments: []

- id: meta-labeling
  source:
    author: "Marcos López de Prado"
    title: "Advances in Financial Machine Learning"
    year: 2018
    chapter: "Chapter 3 — Meta-Labeling"
  claim: "A secondary ML model trained to predict whether the primary model's signal will be correct (meta-labeling) improves precision without sacrificing the primary model's recall, enabling effective bet sizing."
  mechanism: "The primary model generates directional signals (long/short). The meta-label model learns which of those signals are likely to succeed by predicting a binary outcome (1 = primary signal was profitable, 0 = was not). By filtering or sizing bets via the meta-model's probability output, overall portfolio Sharpe improves."
  experiment_types: [model_comparison, strategy_optimization, label_engineering]
  testable_prediction: "Adding a meta-labeling layer on top of Gefion's trend classifier will increase the strategy Sharpe ratio by at least 15% relative to using the raw classifier signals, primarily through improved precision."
  experiment_design: "Take the existing trend classifier predictions as the primary signal. Construct meta-labels: 1 when the classifier's predicted direction matched realized returns over the holding period, 0 otherwise. Train a gradient-boosted meta-model on feature importance scores plus primary model confidence. Backtest the strategy using meta-model-filtered signals versus unfiltered, comparing Sharpe, max drawdown, and hit rate."
  known_limitations: "Meta-labeling requires the primary model to have acceptable recall — if the primary misses most opportunities, the meta-model has nothing useful to filter. Adds pipeline complexity and a second model to maintain."
  data_requirements: ["ml_predictions.direction", "ml_predictions.confidence", "ohlcv.close", "features.*"]
  empirical_status: untested
  experiments: []

- id: triple-barrier-method
  source:
    author: "Marcos López de Prado"
    title: "Advances in Financial Machine Learning"
    year: 2018
    chapter: "Chapter 3 — The Triple-Barrier Method"
  claim: "Fixed-horizon labels are suboptimal; the triple-barrier method (profit-taking, stop-loss, max-holding-period) produces path-dependent labels that better reflect realistic trading outcomes and reduce noise."
  mechanism: "Each observation is labeled based on which barrier is hit first: an upper barrier (take-profit), lower barrier (stop-loss), or a vertical barrier (time expiry). This encodes the actual risk-reward dynamics a trader faces, producing cleaner labels than simple forward-return signs."
  experiment_types: [label_engineering, model_comparison]
  testable_prediction: "Models trained on triple-barrier labels will produce higher risk-adjusted returns in backtests than models trained on fixed 5-day forward return labels, because the labels incorporate path-dependent risk."
  experiment_design: "Implement triple-barrier labeling with volatility-scaled barriers (2x daily ATR for profit/stop, 10-day max hold). Generate labels for the stock universe. Train identical quantile regression models on (a) triple-barrier labels and (b) fixed 5-day return labels. Run walk-forward backtests and compare Sharpe, Calmar ratio, and maximum drawdown."
  known_limitations: "Barrier widths are hyperparameters that require careful tuning per asset class and volatility regime. Narrow barriers in low-vol environments produce excessively noisy labels."
  data_requirements: ["ohlcv.close", "ohlcv.high", "ohlcv.low", "features.atr"]
  empirical_status: untested
  experiments: []

- id: feature-importance-mda-mdi
  source:
    author: "Marcos López de Prado"
    title: "Advances in Financial Machine Learning"
    year: 2018
    chapter: "Chapter 8 — Feature Importance"
  claim: "Mean Decrease Impurity (MDI) is biased toward high-cardinality features, while Mean Decrease Accuracy (MDA) via permutation provides unbiased but noisier importance estimates; using both together and discarding features not ranked by either reduces overfitting."
  mechanism: "MDI aggregates the impurity reduction from splits on each feature across all trees — continuous features get more splits and appear artificially important. MDA shuffles each feature column and measures the accuracy drop, which is unbiased but has high variance. Their intersection identifies genuinely important features."
  experiment_types: [feature_selection, feature_engineering]
  testable_prediction: "Restricting the feature set to features ranked in the top quartile by both MDI and MDA (intersection set) will match or exceed model accuracy while reducing the feature count by more than 50%."
  experiment_design: "Train a random forest on all computed features in Gefion. Extract MDI and MDA importance rankings. Define the intersection set (top-25% by both). Retrain using only intersection features. Compare OOS accuracy, information coefficient, and training time against the full-feature model across a walk-forward window."
  known_limitations: "MDA importance is sensitive to feature correlations — permuting one of two correlated features may show low importance for both. Clustered feature importance (CFI) is more robust for correlated feature sets."
  data_requirements: ["features.*", "ml_models.feature_names", "ohlcv.close"]
  empirical_status: untested
  experiments: []

- id: sequential-bootstrapping
  source:
    author: "Marcos López de Prado"
    title: "Advances in Financial Machine Learning"
    year: 2018
    chapter: "Chapter 4 — Sample Weights and Sequential Bootstrapping"
  claim: "Standard bootstrapping draws redundant overlapping samples, inflating effective sample count; sequential bootstrapping accounts for label overlap via an indicator matrix, producing more independent draws and better bagging performance."
  mechanism: "An indicator matrix records which price bars each label spans. Sequential bootstrapping draws samples one at a time, weighting candidates by their average uniqueness given already-selected samples, ensuring the bootstrap draw has higher effective information content."
  experiment_types: [pipeline, model_comparison]
  testable_prediction: "Ensemble models (bagging) using sequential bootstrapping will show lower variance in OOS predictions and higher Sharpe ratios than those using standard bootstrapping, particularly for overlapping-label datasets."
  experiment_design: "Build the indicator matrix for Gefion's label set. Implement sequential bootstrap sampling. Train two bagged random forests — one with standard bootstrap, one with sequential bootstrap — on the same feature set. Compare OOS prediction variance, accuracy stability across time, and backtest Sharpe over 12-month walk-forward windows."
  known_limitations: "Sequential bootstrapping is computationally expensive (O(n^2) with the indicator matrix). For non-overlapping labels (e.g., fixed daily bars), it collapses to standard bootstrapping and provides no benefit."
  data_requirements: ["ml_labels.start_time", "ml_labels.end_time", "features.*"]
  empirical_status: untested
  experiments: []

- id: bet-sizing
  source:
    author: "Marcos López de Prado"
    title: "Advances in Financial Machine Learning"
    year: 2018
    chapter: "Chapter 10 — Bet Sizing"
  claim: "Optimal position sizing should be derived from the model's predicted probability of profit and the distribution of expected payoffs, not from equal-weight or conviction-blind allocation."
  mechanism: "Using the meta-labeling model's output probability and mapping it through a sizing function (e.g., sigmoid, budget-constrained concave function), positions are scaled so that high-confidence signals receive larger allocations while uncertain signals are underweighted, improving the Sharpe ratio of the aggregate portfolio."
  experiment_types: [strategy_optimization, pipeline]
  testable_prediction: "A strategy using probability-weighted bet sizing will achieve a higher Sharpe ratio and lower maximum drawdown than the same signals with equal-weight sizing."
  experiment_design: "Take Gefion's classifier output probabilities. Map to position sizes via (a) equal weight, (b) linear scaling with probability, (c) sigmoid-based concave scaling. Backtest each sizing scheme on identical signals over 2+ years. Compare Sharpe, Calmar ratio, max drawdown, and turnover."
  known_limitations: "Requires well-calibrated probability outputs — poorly calibrated models will missize bets. Concentrated sizing increases single-stock risk and requires liquidity checks."
  data_requirements: ["ml_predictions.confidence", "ohlcv.close", "ohlcv.volume"]
  empirical_status: untested
  experiments: []

- id: structural-breaks-cusum
  source:
    author: "Marcos López de Prado"
    title: "Advances in Financial Machine Learning"
    year: 2018
    chapter: "Chapter 17 — Structural Breaks"
  claim: "Detecting structural breaks (via CUSUM, Chow, or SADF tests) in feature or return distributions signals regime changes that should trigger model retraining or signal suppression."
  mechanism: "Financial time series are non-stationary and undergo regime shifts. A CUSUM filter on model residuals or return distributions detects when cumulative deviations exceed a threshold, indicating the data-generating process has changed and the current model is likely stale."
  experiment_types: [pipeline, strategy_optimization]
  testable_prediction: "Triggering model retraining upon CUSUM-detected structural breaks will reduce maximum drawdown during regime transitions compared to fixed-schedule retraining."
  experiment_design: "Implement a CUSUM filter on rolling model residuals (predicted vs. actual returns). When the filter fires, retrain the model on the most recent data window. Compare this adaptive retraining against fixed monthly retraining and no retraining, measuring drawdown during known regime changes (e.g., COVID crash, rate hike cycles), Sharpe, and recovery time."
  known_limitations: "CUSUM threshold selection is a bias-variance tradeoff — too sensitive causes excessive retraining, too insensitive misses genuine breaks. The filter detects breaks after they occur, introducing lag."
  data_requirements: ["ohlcv.close", "ml_predictions.*", "features.*"]
  empirical_status: untested
  experiments: []

