- id: alternative-data-integration
  source:
    author: "Stefan Jansen"
    title: "Machine Learning for Algorithmic Trading"
    year: 2020
    chapter: "Part 2 — Alternative Data and NLP"
  claim: "Integrating alternative data signals (sentiment, fundamental ratios, macro indicators) with technical features improves model performance because alternative data captures information orthogonal to price action."
  mechanism: "Price-derived features are highly correlated with each other and quickly arbitraged. Alternative data introduces independent dimensions of information (e.g., earnings surprise, sector momentum, credit spreads) that provide incremental predictive power, especially at longer horizons."
  experiment_types: [feature_engineering, model_comparison]
  testable_prediction: "Adding fundamental and macro features (P/E ratio, sector relative strength, VIX level, yield curve slope) to Gefion's technical feature set will increase OOS information coefficient by at least 10%."
  experiment_design: "Extend Gefion's feature definitions to include fundamental ratios and macro indicators. Train the quantile regression model on (a) technical features only and (b) technical + fundamental + macro features. Evaluate via walk-forward backtest, measuring IC, rank IC, and Sharpe improvement. Use MDA to verify which alternative features contribute."
  known_limitations: "Alternative data can be expensive, sparse, or subject to survivorship and look-ahead bias. Fundamental data has lower frequency (quarterly) and requires point-in-time handling to avoid look-ahead bias."
  data_requirements: ["ohlcv.*", "features.*", "fundamental.pe_ratio", "fundamental.sector", "macro.vix", "macro.yield_curve"]
  empirical_status: untested
  experiments: []

- id: factor-models-with-ml
  source:
    author: "Stefan Jansen"
    title: "Machine Learning for Algorithmic Trading"
    year: 2020
    chapter: "Chapter 7 — Linear Models: From Risk Factors to Return Forecasts"
  claim: "Replacing linear factor model weightings with ML-learned nonlinear combinations of the same factors captures interaction effects and time-varying factor premia that linear models miss."
  mechanism: "Traditional factor models (Fama-French, momentum, quality) assume constant linear factor loadings. ML models learn nonlinear interactions (e.g., value works best in low-volatility regimes) and time-varying exposures, capturing more of the return-generating process."
  experiment_types: [model_comparison, feature_engineering]
  testable_prediction: "A gradient-boosted model using standard factor exposures (value, momentum, quality, volatility) as features will produce higher risk-adjusted returns than a linear factor model using the same inputs."
  experiment_design: "Compute factor exposures for the Gefion stock universe: book-to-market (value), 12-1 month momentum, ROE (quality), and realized volatility. Train a linear regression and a LightGBM model on the same factor features. Walk-forward backtest both on a long-short quintile strategy, comparing annualized alpha, Sharpe, and factor exposure stability."
  known_limitations: "Nonlinear models may overfit to specific factor regimes and perform poorly during factor rotations. Linear models are more interpretable and stable, which may be preferable for risk management."
  data_requirements: ["ohlcv.*", "features.momentum_12m", "features.volatility_realized", "fundamental.book_to_market", "fundamental.roe"]
  empirical_status: untested
  experiments: []

- id: ensemble-methods-stacking
  source:
    author: "Stefan Jansen"
    title: "Machine Learning for Algorithmic Trading"
    year: 2020
    chapter: "Chapter 12 — Boosting and Chapter 11 — Ensemble Methods"
  claim: "Stacking diverse model families (tree-based, linear, neural) produces more robust predictions than any single model because uncorrelated model errors cancel out."
  mechanism: "Diverse base learners make different types of errors. A meta-learner trained on their OOS predictions learns which base model to trust in which regime, yielding a composite prediction with lower variance and often lower bias than the best individual model."
  experiment_types: [model_comparison, pipeline]
  testable_prediction: "A stacked ensemble of Gefion's quantile regression, trend classifier, and a LightGBM model will achieve a higher Sharpe ratio and lower prediction variance than any single constituent model."
  experiment_design: "Train three base models on Gefion's feature set using purged CV: quantile regression, trend classifier, and LightGBM. Generate OOS predictions for each via walk-forward splits. Train a ridge-regression meta-learner on the stacked OOS predictions. Compare the ensemble's backtest Sharpe, max drawdown, and turnover against each base model individually."
  known_limitations: "Ensembles add latency and complexity. If base models are highly correlated (e.g., all tree-based), stacking provides marginal improvement. The meta-learner can overfit if the base model CV is not properly purged."
  data_requirements: ["features.*", "ohlcv.close", "ml_predictions.*"]
  empirical_status: untested
  experiments: []

- id: walk-forward-optimization
  source:
    author: "Stefan Jansen"
    title: "Machine Learning for Algorithmic Trading"
    year: 2020
    chapter: "Chapter 6 — The Machine Learning Process"
  claim: "Walk-forward optimization — retraining models on expanding or rolling windows and testing on the immediately following period — is the only valid backtesting methodology for non-stationary financial data."
  mechanism: "Financial markets are non-stationary: feature-return relationships drift over time. Walk-forward evaluation retains temporal ordering, prevents look-ahead bias, and measures performance under realistic conditions where the model has never seen future data. It simulates the actual deployment experience."
  experiment_types: [pipeline, hyperparameter]
  testable_prediction: "Walk-forward backtest results will be consistently 20-40% lower than single-split train/test results for the same model, and walk-forward results will more closely predict live trading performance."
  experiment_design: "Run Gefion's quantile regression model through three evaluation frameworks: (a) random 80/20 train-test split, (b) single temporal split (train on 2020-2023, test on 2024), (c) quarterly walk-forward with 2-year expanding training window. Compare the Sharpe ratios and their gap from hypothetical live performance. Track whether walk-forward estimates are more stable and realistic."
  known_limitations: "Walk-forward is computationally expensive (N retraining cycles). Expanding windows may include stale data from old regimes; rolling windows may discard useful information. Window length is a hyperparameter itself."
  data_requirements: ["ohlcv.*", "features.*"]
  empirical_status: untested
  experiments: []

