services:
  postgres:
    image: timescale/timescaledb:2.12.0-pg14
    container_name: gefion-postgres
    restart: unless-stopped
    command:
      [
        "postgres",
        "-c", "shared_preload_libraries=timescaledb",
        "-c", "max_locks_per_transaction=256"
      ]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gefion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gefionpass}
      POSTGRES_DB: ${POSTGRES_DB:-gefion}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gefion} -d ${POSTGRES_DB:-gefion}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml:
    build:
      context: .
      dockerfile: docker/Dockerfile.ml
    working_dir: /app
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-gefion}:${POSTGRES_PASSWORD:-gefionpass}@postgres:5432/${POSTGRES_DB:-gefion}}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
